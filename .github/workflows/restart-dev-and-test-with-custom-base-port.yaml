name: "Dev Environment Test With Custom Base Port"

on:
  push:
    branches:
      - main
      - dev
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

env:
  SHELL: /usr/bin/bash

jobs:
  restart-dev-and-test-with-custom-base-port:
    runs-on: ubicloud-standard-16
    env:
      NEXT_PUBLIC_STACK_PORT_PREFIX: "69"
      STACK_EXTERNAL_DB_SYNC_MAX_DURATION_MS: "20000"
      STACK_EXTERNAL_DB_SYNC_DIRECT: "false"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js v20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install packages
        run: pnpm install

      - name: Build packages
        run: pnpm run build:packages

      - name: Generate code
        run: pnpm run codegen

      - name: Restart dependencies
        run: pnpm run restart-deps

      - name: Start dev server in background
        uses: JarvusInnovations/background-action@v1.0.7
        with:
          run: pnpm run dev
          wait-on: |
            http://localhost:6902
          tail: true
          wait-for: 120s
          log-output-if: true

      - name: Run tests
        run: pnpm run test run --reporter=verbose
